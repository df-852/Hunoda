name: Deploy Preview

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write  # Added for deployment action auth

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Minify files (optional for preview)
        uses: asherf/minify-action@v1.0.2
        with:
          directory: '.'
          output: '.'
          html: true
          css: true
          js: true

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages-preview-${{ github.head_ref }} # Unique preview branch
          folder: .
